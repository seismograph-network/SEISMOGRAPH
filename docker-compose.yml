# docker-compose.yml
# SEISMOGRAPH multi-service orchestration stack
# ==============================================
# Starts four services:
#   gateway    -- SEISMOGRAPH ingestion + weather API (port 8000)
#   clickhouse -- Time-series signal store          (ports 8123, 9000)
#   redis      -- Distributed quorum state          (port 6379)
#   fleet      -- First-party canary probe runner   (no exposed ports)
#
# Usage:
#   docker-compose up --build          # first run
#   docker-compose up -d               # detached
#   docker-compose logs -f gateway     # follow gateway logs
#   docker-compose logs -f fleet       # follow fleet probe logs
#   docker-compose down -v             # stop and remove volumes
#
# Copy .env.example to .env to override any defaults.
# Set OPENAI_API_KEY and ANTHROPIC_API_KEY in .env or the environment
# to enable real API calls.  If absent, fleet runs in MOCK mode.

version: "3.9"

services:

  # --------------------------------------------------------------------------
  # gateway: SEISMOGRAPH ingestion + weather API
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Force ClickHouse backend instead of default SQLite
      STORAGE_BACKEND: "clickhouse"
      # Force Redis quorum backend instead of default in-process dict
      QUORUM_BACKEND: "redis"
      # ClickHouse DSN -- hostname matches the service name below
      CLICKHOUSE_URL: "clickhouse://clickhouse:9000/default"
      # Redis DSN -- hostname matches the service name below
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
    restart: on-failure
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/v1/weather')
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # --------------------------------------------------------------------------
  # clickhouse: time-series signal and alert store
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface (admin UI, curl queries)
      - "9000:9000"   # Native TCP interface (clickhouse-connect)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # --------------------------------------------------------------------------
  # redis: distributed quorum state (AgreementScorer backend)
  # --------------------------------------------------------------------------
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # --------------------------------------------------------------------------
  # fleet: first-party canary probe runner
  # --------------------------------------------------------------------------
  # Runs scripts/first_party_fleet.py in an infinite loop (default: 4 h
  # between rounds).  Uses a separate Dockerfile.fleet because the main
  # Dockerfile excludes probe/ (AD-CONTAINER-003).
  #
  # Ed25519 fleet key is persisted in the fleet_key named volume so
  # the fleet identity survives container restarts and upgrades.
  #
  # Mock mode: if OPENAI_API_KEY and ANTHROPIC_API_KEY are both absent,
  # the runner simulates healthy responses and still builds CUSUM baselines.
  fleet:
    build:
      context: .
      dockerfile: Dockerfile.fleet
    environment:
      SEISMOGRAPH_GATEWAY_URL: "http://gateway:8000/v1/signals"
      SEISMOGRAPH_KEY_DIR: "/var/seismograph"
      PROBE_INTERVAL_SECONDS: "14400"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - fleet_key:/var/seismograph
    depends_on:
      gateway:
        condition: service_started
    restart: on-failure

# Persistent named volumes (survive docker-compose down without -v)
volumes:
  clickhouse_data:
  redis_data:
  fleet_key:
