<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SEISMOGRAPH &mdash; Model Weather</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --green:    #22c55e;
      --red:      #ef4444;
      --accent:   #818cf8;
      --font:     -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono:     "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- header ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .logo { display: flex; align-items: baseline; gap: 0.8rem; }

    .logo h1 {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      color: var(--accent);
    }

    .logo .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
      line-height: 1.6;
    }

    /* ---- main ---- */
    main {
      flex: 1;
      padding: 1.5rem 2rem 2.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .banner {
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .banner.visible { display: block; }
    .banner-error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.28);
      color: #fca5a5;
    }

    /* ---- grid ---- */
    #weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 3rem 0;
      grid-column: 1 / -1;
      text-align: center;
      line-height: 1.7;
    }
    .empty code {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--accent);
    }

    /* ---- cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      transition: border-color 0.18s;
    }
    .card:hover { border-color: #2a2a3e; }
    .card-drifting { border-color: rgba(239,68,68,.32); }
    .card-drifting:hover { border-color: rgba(239,68,68,.52); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-stable  { background: var(--green); }
    .dot-drifting {
      background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;    transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    .model-name {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.4;
    }

    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      font-family: var(--mono);
      flex-shrink: 0;
    }
    .badge-stable   { background: rgba(34,197,94,.13);  color: #4ade80; }
    .badge-drifting { background: rgba(239,68,68,.14);  color: #f87171; }

    .metrics { display: grid; gap: 0.4rem; }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.78rem;
      gap: 0.5rem;
    }
    .metric-row dt { color: var(--muted); }
    .metric-row dd { font-family: var(--mono); color: var(--text); }

    .alert-row dt,
    .alert-row dd { color: #fca5a5; font-size: 0.72rem; }

    /* ---- footer ---- */
    footer {
      border-top: 1px solid var(--border);
      padding: 0.8rem 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>&#x2B21; SEISMOGRAPH</h1>
    <span class="subtitle">Model Weather Report</span>
  </div>
  <div class="meta">
    <span id="last-updated">Loading&hellip;</span>
    <span>Auto-refresh every 60&thinsp;s</span>
  </div>
</header>

<main>
  <div id="status-banner" class="banner banner-error"></div>
  <div id="weather-grid"></div>
</main>

<footer>
  Phase 1 MVP &middot; Privacy-preserving &middot; No raw prompt data transmitted
</footer>

<script src="/static/app.js"></script>
</body>
</html>
